<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Links</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #000000, #4E47D1);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #fff;
      margin-bottom: 20px;
    }

    h1 {
      margin: 10px 0 20px;
      font-size: 28px;
      text-align: center;
    }

    .link {
      width: 100%;
      max-width: 350px;
      background: #fff;
      color: #333;
      text-decoration: none;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      font-size: 18px;
      text-align: center;
      transition: 0.2s;
      font-weight: bold;
    }

    .link:hover {
      background: #e5e5e5;
      transform: scale(1.03);
    }
  </style>
</head>
<body>

  <!-- Foto ou avatar -->
  <div class="avatar"></div>

  <!-- Nome -->
  <h1>Seu Nome Aqui</h1>

  <!-- Meus links -->
  <a class="link" href="#">Instagram</a>
  <a class="link" href="#">WhatsApp</a>
  <a class="link" href="#">TikTok</a>
  <a class="link" href="#">YouTube</a>

</body>
</html>
